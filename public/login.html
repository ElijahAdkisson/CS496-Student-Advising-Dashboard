<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        /* css for lighthouse compliance */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        main {
            max-width: 400px;
        }

        input, button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            cursor: pointer;
        }

        label {
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <main>
        <h2>Login</h2>

        <form action="/auth" method="POST">
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>

            <button type="submit" name="action" value="login">Login</button>
            <button type="submit" name="action" value="register">Create User</button>
        </form>
    </main>

</body>
</html>
