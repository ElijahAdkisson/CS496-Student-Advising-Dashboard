<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Transcript</title>
    <style>
        /* css for lighthouse compliance */

        button,
        input[type="submit"],
        input[type="button"] {
            min-height: 44px;
            min-width: 44px;
            padding: 10px 14px;
            margin: 8px 0;
            cursor: pointer;
        }

        input[type="text"],
        input[type="password"],
        input[type="url"] {
            min-height: 44px;
            padding: 8px 10px;
            margin: 6px 0 12px 0;
            box-sizing: border-box;
        }

        label {
            display: inline-block;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            padding: 8px 0;
            margin: 6px 0;
        }

        fieldset {
            margin-bottom: 16px;
        }

        form {
            margin-bottom: 18px;
        }
    </style>
</head>
<body>

<main>

    <h2>Upload Transcript or Select Program</h2>
    
    <form action="/programselect" method="POST">
        <fieldset>
            <legend>Select Program</legend>

            <label for="programSelect">Select Program:</label>
            <select id="programSelect" name="program" required>
                <option value="" disabled selected>Loading programs...</option>
            </select>
            <button type="submit">Select Program</button>
        </fieldset>
    </form>

    <script> //this fills the drop down with only existing majors in the database
    fetch('/api/programs')
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('programSelect');

            //clear existing options
            select.innerHTML = '';

            data.forEach(program => {
                const option = document.createElement('option');
                option.value = program;
                option.textContent = program;
                select.appendChild(option);
            });
        })
        .catch(err => {
            console.error(err);
            const select = document.getElementById('programSelect');
            select.innerHTML = '<option disabled>Error loading programs</option>';
        });

        fetch('/api/is-advisor') //only shows advisor panel if user is an advisor
            .then(res => res.json())
            .then(data => {
                if (data.isAdvisor) {
                    const advisorButton = document.createElement('button');
                    advisorButton.textContent = 'Advisor Panel';
                    advisorButton.onclick = () => {
                       window.location.href = '/advisorpanel';
                    };
                    advisorButton.type = 'button'; //prevent form submission

                    //show the button before the rest of the page
                    document.body.insertBefore(advisorButton, document.body.firstChild);
                }
            })
            .catch(err => console.error(err));
    </script>


    <p> OR </p>

    
    <form action="/uploadtranscript" method="post" enctype="multipart/form-data">
        <fieldset>
            <legend>Upload Transcript</legend>

            <label for="file-upload">Select file:</label>
            <input type="file" id="file-upload" name="file" accept=".pdf" required />
            <button type="submit">Upload Transcript</button>
        </fieldset>
    </form>

    
    <form action="/logout" method="GET">
        <button type="submit">Logout</button>
    </form>


</main>

</body>
</html>
